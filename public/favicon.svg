<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="32" height="32">
  <defs>
    <linearGradient id="mainGrad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5ed0fe"/>
      <stop offset=".5" stop-color="#0862a7"/>
      <stop offset="1" stop-color="#6b119a"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="256" x2="512" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4dff00"/>
      <stop offset="1" stop-color="#5ed0fe"/>
    </linearGradient>
    <linearGradient id="bodyGrad" x1="256" y1="40" x2="256" y2="470" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5ed0fe"/>
      <stop offset=".4" stop-color="#0862a7"/>
      <stop offset="1" stop-color="#6b119a"/>
    </linearGradient>
    <linearGradient id="wingGradL" x1="20" y1="90" x2="256" y2="270" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5ed0fe"/>
      <stop offset="1" stop-color="#0862a7"/>
    </linearGradient>
    <linearGradient id="wingGradR" x1="492" y1="90" x2="256" y2="270" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5ed0fe"/>
      <stop offset="1" stop-color="#0862a7"/>
    </linearGradient>
    <radialGradient id="eyeGlowL" cx="235" cy="98" r="25" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4dff00" stop-opacity=".8"/>
      <stop offset=".4" stop-color="#4dff00" stop-opacity=".2"/>
      <stop offset="1" stop-color="#4dff00" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="eyeGlowR" cx="277" cy="98" r="25" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4dff00" stop-opacity=".8"/>
      <stop offset=".4" stop-color="#4dff00" stop-opacity=".2"/>
      <stop offset="1" stop-color="#4dff00" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="centerGlow" cx="256" cy="260" r="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0862a7" stop-opacity=".3"/>
      <stop offset="1" stop-color="#0862a7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="headGlow" cx="256" cy="70" r="60" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5ed0fe" stop-opacity=".25"/>
      <stop offset="1" stop-color="#5ed0fe" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="eyeBloom">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feColorMatrix in="b" type="saturate" values="2" result="s"/>
      <feMerge><feMergeNode in="s"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="48" fill="#080c14"/>

  <circle cx="256" cy="260" r="180" fill="url(#centerGlow)"/>
  <circle cx="256" cy="70" r="70" fill="url(#headGlow)"/>

  <!-- Filled facets -->
