  <line x1="185" y1="345" x2="140" y2="435" stroke="url(#mainGrad)" stroke-width="1.5" opacity=".45" filter="url(#glow)"/>
  <line x1="327" y1="345" x2="372" y2="435" stroke="url(#mainGrad)" stroke-width="1.5" opacity=".45" filter="url(#glow)"/>
  <line x1="140" y1="435" x2="256" y2="450" stroke="url(#mainGrad)" stroke-width="1.2" opacity=".35"/>
